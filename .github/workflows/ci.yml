name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: python -m pip install --upgrade pip yamllint ruff
      - run: npm install --global markdownlint-cli2
      - run: make test
      - run: make build
      - run: make verify
